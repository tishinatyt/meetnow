<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MeetNow — Успішна оплата</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F8F7F4;
    --card: #FFFFFF;
    --border: #E5E5E5;
    --accent: #FF6B35;
    --accent-dim: #FFF4F0;
    --text: #1A1A1A;
    --muted: #666666;
    --green: #22c55e;
  }
  html, body {
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  #app {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    text-align: center;
  }
  .logo { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 48px; }
  .logo span { color: var(--accent); }
  .emoji { font-size: 72px; margin-bottom: 28px; animation: pop 0.5s cubic-bezier(.34,1.56,.64,1) both; }
  @keyframes pop { from { transform: scale(0.4); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  h1 { font-size: 30px; font-weight: 800; margin-bottom: 16px; line-height: 1.2; }
  p {
    font-size: 16px;
    color: var(--muted);
    line-height: 1.65;
    max-width: 320px;
    margin: 0 auto 48px;
  }
  .btn-home {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 16px 40px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    text-decoration: none;
    transition: opacity 0.15s, transform 0.15s;
    box-shadow: 0 4px 24px rgba(255,107,53,0.35);
  }
  .btn-home:hover { transform: translateY(-1px); opacity: 0.92; }
</style>
</head>
<body>
<div id="app">
  <div class="logo">Meet<span>Now</span></div>
  <div class="emoji">🎉</div>
  <h1>Депозит сплачено!</h1>
  <p>Ми підберемо тобі групу і повідомимо в Telegram</p>
  <a class="btn-home" href="index.html">Повернутись на головну</a>
</div>
</body>
</html>
