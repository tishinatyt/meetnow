<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MeetNow — Заходи в Чернігові</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F8F7F4;
  --card: #FFFFFF;
  --card2: #EDEBE6;
  --border: #E5E5E5;
  --accent: #FF6B35;
  --accent-dim: #FFF4F0;
  --text: #1A1A1A;
  --muted: #666666;
  --green: #22c55e;
  --green-dim: rgba(34,197,94,0.10);
}
html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }

/* ── Header ── */
.header {
  position: sticky; top: 0; z-index: 30;
  background: var(--card);
  border-bottom: 1px solid var(--border);
}
.header-top {
  max-width: 1100px; margin: 0 auto;
  padding: 0 16px;
  height: 56px; display: flex; align-items: center; gap: 14px;
}
.logo { font-size: 18px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; text-decoration: none; }
.logo span { color: var(--accent); }
.header-title { font-size: 16px; font-weight: 700; }
.back-link { font-size: 13px; font-weight: 600; color: var(--muted); text-decoration: none; margin-left: auto; }
.back-link:hover { color: var(--text); }

/* ── Filters ── */
.filters-wrap {
  background: var(--card); border-bottom: 1px solid var(--border);
  padding: 0 16px;
}
.filters {
  max-width: 1100px; margin: 0 auto;
  display: flex; gap: 8px;
  overflow-x: auto; padding: 10px 0;
  scrollbar-width: none;
}
.filters::-webkit-scrollbar { display: none; }
.filter-btn {
  flex-shrink: 0; background: var(--bg);
  border: 1.5px solid var(--border);
  color: var(--muted); border-radius: 100px;
  padding: 8px 16px; font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: inherit;
  transition: all 0.15s; white-space: nowrap;
}
.filter-btn:hover { border-color: #BFBFBF; color: var(--text); }
.filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* ── Main grid ── */
#main {
  max-width: 1100px; margin: 0 auto;
  padding: 28px 16px 80px;
}

/* ── Skeleton ── */
.skeletons { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
.skeleton-card { background: var(--card); border-radius: 16px; overflow: hidden; }
.sk-img { height: 180px; background: var(--card2); animation: pulse 1.4s ease-in-out infinite; }
.sk-body { padding: 16px; }
.sk-line { height: 13px; background: var(--card2); border-radius: 100px; margin-bottom: 10px; animation: pulse 1.4s ease-in-out infinite; }
.sk-line.w50 { width: 50%; }
.sk-line.w70 { width: 70%; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ── Events grid ── */
#events-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }

/* ── Event card ── */
.event-card {
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: 20px; overflow: hidden;
  display: flex; flex-direction: column;
  transition: box-shadow 0.2s, transform 0.2s;
}
.event-card:hover { box-shadow: 0 8px 32px rgba(0,0,0,0.10); transform: translateY(-3px); }
.event-img {
  width: 100%; height: 180px;
  object-fit: cover; display: block; background: var(--card2);
}
.event-img-placeholder {
  width: 100%; height: 180px;
  display: flex; align-items: center; justify-content: center;
  font-size: 56px;
}
.event-body { padding: 18px 18px 20px; flex: 1; display: flex; flex-direction: column; }
.event-badge {
  display: inline-block; background: var(--accent-dim); color: var(--accent);
  font-size: 11px; font-weight: 800; border-radius: 100px;
  padding: 3px 10px; margin-bottom: 10px;
  letter-spacing: 0.3px;
}
.event-title { font-size: 17px; font-weight: 800; margin-bottom: 8px; line-height: 1.3; }
.event-meta { font-size: 13px; color: var(--muted); margin-bottom: 5px; display: flex; align-items: center; gap: 6px; }
.event-meta-icon { font-size: 13px; }
.event-price-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: auto; padding-top: 14px;
}
.event-price { font-size: 16px; font-weight: 800; color: var(--accent); }
.event-price.free { color: var(--green); }
.event-spots { font-size: 12px; color: var(--muted); }
.btn-reg {
  width: 100%; background: var(--accent); color: #fff;
  border: none; border-radius: 10px;
  padding: 13px; font-size: 14px; font-weight: 700;
  cursor: pointer; font-family: inherit;
  margin-top: 14px;
  transition: opacity 0.15s;
  box-shadow: 0 3px 14px rgba(255,107,53,0.3);
}
.btn-reg:hover { opacity: 0.9; }
.btn-reg.full { background: var(--card2); color: var(--muted); cursor: not-allowed; box-shadow: none; }

/* ── Empty ── */
#empty {
  display: none; text-align: center; padding: 80px 24px;
}
#empty .empty-icon { font-size: 56px; margin-bottom: 16px; }
#empty h3 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
#empty p { font-size: 14px; color: var(--muted); }

/* ── Modal ── */
#modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 50;
  background: rgba(0,0,0,0.65);
  align-items: flex-end; justify-content: center;
}
#modal-overlay.show { display: flex; }
.modal-sheet {
  background: var(--card); border-radius: 24px 24px 0 0;
  padding: 28px 20px 40px; width: 100%; max-width: 480px;
  animation: slideUp 0.3s ease;
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 100px; margin: 0 auto 22px; }
.modal-title { font-size: 20px; font-weight: 800; margin-bottom: 6px; }
.modal-subtitle { font-size: 14px; color: var(--muted); margin-bottom: 22px; line-height: 1.5; }

.modal-group { margin-bottom: 14px; }
.modal-group label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 6px; }
.modal-group input {
  width: 100%; background: var(--bg);
  border: 1.5px solid var(--border); border-radius: 12px;
  padding: 13px 16px; font-size: 15px; font-weight: 500;
  color: var(--text); font-family: inherit; outline: none;
  transition: border-color 0.15s;
  -webkit-appearance: none;
}
.modal-group input:focus { border-color: var(--accent); }

.btn-modal-submit {
  width: 100%; background: var(--accent); color: #fff;
  border: none; border-radius: 14px;
  padding: 16px; font-size: 16px; font-weight: 800;
  cursor: pointer; font-family: inherit;
  box-shadow: 0 4px 24px rgba(255,107,53,0.35);
  transition: opacity 0.15s, transform 0.15s;
  margin-top: 4px;
}
.btn-modal-submit:hover:not(:disabled) { transform: translateY(-1px); }
.btn-modal-submit:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; transform: none; }
.btn-cancel-modal {
  width: 100%; background: none; border: 1.5px solid var(--border);
  color: var(--muted); border-radius: 12px;
  padding: 13px; font-size: 14px; font-weight: 600;
  cursor: pointer; font-family: inherit; margin-top: 10px;
}

.modal-success { display: none; text-align: center; padding: 16px 0 8px; }
.modal-success .ms-icon { font-size: 48px; margin-bottom: 14px; }
.modal-success h3 { font-size: 20px; font-weight: 800; margin-bottom: 8px; }
.modal-success p { font-size: 14px; color: var(--muted); line-height: 1.6; }

/* ── Organizer link ── */
.organizer-cta {
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: 16px; padding: 18px 20px;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  margin-bottom: 28px; text-decoration: none;
  transition: box-shadow 0.2s;
}
.organizer-cta:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
.organizer-cta-text { font-size: 14px; font-weight: 700; color: var(--text); }
.organizer-cta-sub { font-size: 12px; color: var(--muted); margin-top: 3px; }
.organizer-cta-arrow { font-size: 20px; color: var(--accent); flex-shrink: 0; }

/* ── Toast ── */
#toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: #ef4444; color: #fff;
  padding: 12px 24px; border-radius: 100px;
  font-size: 14px; font-weight: 600;
  transition: transform 0.3s; z-index: 99;
  white-space: nowrap;
}
#toast.show { transform: translateX(-50%) translateY(0); }

@media (max-width: 600px) {
  #events-grid { grid-template-columns: 1fr; }
  .skeletons { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-top">
    <a href="index.html" class="logo">Meet<span>Now</span></a>
    <div class="header-title">Заходи в Чернігові</div>
    <a href="index.html" class="back-link">← На головну</a>
  </div>
</div>

<!-- Filters -->
<div class="filters-wrap">
  <div class="filters" id="filters">
    <button class="filter-btn active" data-type="all" onclick="setFilter(this)">Всі</button>
    <button class="filter-btn" data-type="coffee" onclick="setFilter(this)">☕ Кава</button>
    <button class="filter-btn" data-type="bar" onclick="setFilter(this)">🍷 Бар</button>
    <button class="filter-btn" data-type="dinner" onclick="setFilter(this)">🍽️ Вечеря</button>
    <button class="filter-btn" data-type="cinema" onclick="setFilter(this)">🎬 Кіно</button>
    <button class="filter-btn" data-type="running" onclick="setFilter(this)">🏃 Пробіжка</button>
    <button class="filter-btn" data-type="active" onclick="setFilter(this)">🎳 Боулінг</button>
    <button class="filter-btn" data-type="walk" onclick="setFilter(this)">🚶 Прогулянка</button>
    <button class="filter-btn" data-type="workshop" onclick="setFilter(this)">🎨 Майстер-клас</button>
    <button class="filter-btn" data-type="culture" onclick="setFilter(this)">🎭 Концерт</button>
  </div>
</div>

<!-- Main -->
<div id="main">
  <a href="organizer-cabinet.html" class="organizer-cta">
    <div>
      <div class="organizer-cta-text">Ви організатор або маєте заклад?</div>
      <div class="organizer-cta-sub">Додайте свій захід — безкоштовно</div>
    </div>
    <div class="organizer-cta-arrow">→</div>
  </a>

  <div id="loading" class="skeletons">
    <div class="skeleton-card"><div class="sk-img"></div><div class="sk-body"><div class="sk-line w70"></div><div class="sk-line"></div><div class="sk-line w50"></div></div></div>
    <div class="skeleton-card"><div class="sk-img"></div><div class="sk-body"><div class="sk-line w70"></div><div class="sk-line"></div><div class="sk-line w50"></div></div></div>
    <div class="skeleton-card"><div class="sk-img"></div><div class="sk-body"><div class="sk-line w70"></div><div class="sk-line"></div><div class="sk-line w50"></div></div></div>
  </div>

  <div id="events-grid"></div>

  <div id="empty">
    <div class="empty-icon">📅</div>
    <h3>Зараз немає заходів</h3>
    <p>Але вони скоро з'являться!<br>Слідкуйте за оновленнями.</p>
  </div>
</div>

<!-- Registration Modal -->
<div id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>

    <div id="modal-form-wrap">
      <div class="modal-title" id="modal-event-title">Реєстрація</div>
      <div class="modal-subtitle" id="modal-event-meta"></div>

      <div class="modal-group">
        <label>Ваше ім'я</label>
        <input type="text" id="reg-name" placeholder="Ім'я та прізвище">
      </div>
      <div class="modal-group">
        <label>Телефон</label>
        <input type="tel" id="reg-phone" placeholder="+380 XX XXX XX XX">
      </div>

      <button class="btn-modal-submit" id="btn-modal-submit" onclick="submitRegistration()">Підтвердити →</button>
      <button class="btn-cancel-modal" onclick="closeModal()">Скасувати</button>
    </div>

    <div class="modal-success" id="modal-success">
      <div class="ms-icon">🎉</div>
      <h3>Ти зареєстрований!</h3>
      <p>Ми надішлемо нагадування<br>перед початком заходу.</p>
      <button class="btn-cancel-modal" style="margin-top:20px" onclick="closeModal()">Закрити</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const SB_URL = 'https://pqasdmiqnlyyjwmmqeyc.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxYXNkbWlxbmx5eWp3bW1xZXljIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMDc4ODgsImV4cCI6MjA5Mjc4Mzg4OH0.3CG1PiCOPHNC9PW6txXo-5PWTNxDpAurOxXGlGnni2s';

const TYPE_LABELS = {
  coffee: '☕ Кава та розмова',
  bar: '🍷 Бар та коктейлі',
  dinner: '🍽️ Вечеря',
  cinema: '🎬 Кіно',
  running: '🏃 Пробіжка',
  active: '🎳 Активний відпочинок',
  walk: '🚶 Прогулянка',
  workshop: '🎨 Майстер-клас',
  culture: '🎭 Концерт / Театр',
};
const TYPE_EMOJI = {
  coffee: '☕', bar: '🍷', dinner: '🍽️', cinema: '🎬',
  running: '🏃', active: '🎳', walk: '🚶', workshop: '🎨', culture: '🎭',
};
const PLACEHOLDER_BG = {
  coffee:'#FFF4F0', bar:'#F4F0FF', dinner:'#F0FFF4', cinema:'#FFF0F4',
  running:'#F0F4FF', active:'#FFFFF0', walk:'#F4FFF0', workshop:'#FFF4FF', culture:'#F0F0FF',
};

let allEvents = [];
let regCounts = {};
let currentFilter = 'all';
let activeEventId = null;

async function sbGet(table, params) {
  const res = await fetch(`${SB_URL}/rest/v1/${table}?${params}`, {
    headers: { apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY },
  });
  if (!res.ok) throw new Error(res.statusText);
  return res.json();
}

async function sbPost(table, data) {
  const res = await fetch(`${SB_URL}/rest/v1/${table}`, {
    method: 'POST',
    headers: {
      apikey: SB_KEY,
      Authorization: 'Bearer ' + SB_KEY,
      'Content-Type': 'application/json',
      Prefer: 'return=minimal',
    },
    body: JSON.stringify(data),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || res.statusText);
  }
}

// ── Load events ──
async function loadEvents() {
  document.getElementById('loading').style.display = 'grid';
  document.getElementById('events-grid').innerHTML = '';
  document.getElementById('empty').style.display = 'none';

  try {
    allEvents = await sbGet('events',
      'status=eq.published&order=date.asc&select=id,title,event_type,description,date,venue_name,venue_address,max_participants,price,image_url'
    );

    if (allEvents.length) {
      const ids = allEvents.map(e => e.id);
      try {
        const regs = await sbGet('event_registrations',
          `event_id=in.(${ids.join(',')})&status=neq.cancelled&select=event_id`
        );
        regs.forEach(r => { regCounts[r.event_id] = (regCounts[r.event_id] || 0) + 1; });
      } catch {}
    }
  } catch (err) {
    allEvents = [];
  }

  document.getElementById('loading').style.display = 'none';
  renderEvents();
}

function renderEvents() {
  const grid = document.getElementById('events-grid');
  const empty = document.getElementById('empty');
  grid.innerHTML = '';

  const filtered = currentFilter === 'all'
    ? allEvents
    : allEvents.filter(e => e.event_type === currentFilter);

  if (!filtered.length) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  filtered.forEach(ev => {
    const count = regCounts[ev.id] || 0;
    const max = ev.max_participants || 0;
    const isFull = max > 0 && count >= max;
    const priceLabel = ev.price ? `${ev.price} грн` : 'Безкоштовно';
    const emoji = TYPE_EMOJI[ev.event_type] || '📅';
    const label = TYPE_LABELS[ev.event_type] || ev.event_type;
    const bg = PLACEHOLDER_BG[ev.event_type] || '#F8F7F4';
    const dateStr = ev.date ? formatDate(ev.date) : 'Дата уточнюється';

    const card = document.createElement('div');
    card.className = 'event-card';
    card.innerHTML = `
      ${ev.image_url
        ? `<img class="event-img" src="${escHtml(ev.image_url)}" alt="${escHtml(ev.title)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        : ''}
      <div class="event-img-placeholder" style="background:${bg};display:${ev.image_url ? 'none' : 'flex'}">${emoji}</div>
      <div class="event-body">
        <span class="event-badge">${label}</span>
        <div class="event-title">${escHtml(ev.title)}</div>
        <div class="event-meta"><span class="event-meta-icon">📅</span>${dateStr}</div>
        <div class="event-meta"><span class="event-meta-icon">📍</span>${escHtml(ev.venue_name || '')}</div>
        <div class="event-price-row">
          <span class="event-price${ev.price ? '' : ' free'}">${priceLabel}</span>
          <span class="event-spots">${max > 0 ? `${count} / ${max} учасників` : `${count} учасників`}</span>
        </div>
        <button class="btn-reg${isFull ? ' full' : ''}"
          onclick="${isFull ? '' : `openModal('${ev.id}', this)`}"
          ${isFull ? 'disabled' : ''}>
          ${isFull ? 'Місць немає' : 'Зареєструватись →'}
        </button>
      </div>`;
    grid.appendChild(card);
  });
}

// ── Filter ──
function setFilter(btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.dataset.type;
  renderEvents();
}

// ── Date format ──
function formatDate(iso) {
  const d = new Date(iso);
  const days = ['Неділя','Понеділок','Вівторок','Середа','Четвер','П\'ятниця','Субота'];
  const months = ['січня','лютого','березня','квітня','травня','червня','липня','серпня','вересня','жовтня','листопада','грудня'];
  const day = days[d.getDay()];
  const hh = String(d.getHours()).padStart(2,'0');
  const mm = String(d.getMinutes()).padStart(2,'0');
  return `${day}, ${d.getDate()} ${months[d.getMonth()]} о ${hh}:${mm}`;
}

// ── Modal ──
function openModal(eventId, btn) {
  activeEventId = eventId;
  const ev = allEvents.find(e => e.id === eventId);
  if (!ev) return;

  document.getElementById('modal-event-title').textContent = ev.title;
  document.getElementById('modal-event-meta').textContent =
    `${formatDate(ev.date)} · ${ev.venue_name}`;

  document.getElementById('modal-form-wrap').style.display = 'block';
  document.getElementById('modal-success').style.display = 'none';
  document.getElementById('reg-name').value = '';
  document.getElementById('reg-phone').value = '';
  document.getElementById('btn-modal-submit').disabled = false;
  document.getElementById('btn-modal-submit').textContent = 'Підтвердити →';
  document.getElementById('modal-overlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
  activeEventId = null;
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

async function submitRegistration() {
  const name = document.getElementById('reg-name').value.trim();
  const phone = document.getElementById('reg-phone').value.trim();

  if (!name) { toast('Введіть ваше ім\'я'); return; }
  if (!phone) { toast('Введіть телефон'); return; }

  const btn = document.getElementById('btn-modal-submit');
  btn.disabled = true; btn.textContent = 'Реєструємо…';

  const userId = localStorage.getItem('meetnow_user_id') || null;

  try {
    await sbPost('event_registrations', {
      event_id: activeEventId,
      user_id: userId,
      name,
      phone,
    });

    regCounts[activeEventId] = (regCounts[activeEventId] || 0) + 1;

    document.getElementById('modal-form-wrap').style.display = 'none';
    document.getElementById('modal-success').style.display = 'block';

    renderEvents();
  } catch (err) {
    toast('Помилка реєстрації: ' + err.message);
    btn.disabled = false; btn.textContent = 'Підтвердити →';
  }
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 3500);
}

// ── Init ──
loadEvents();
</script>
</body>
</html>
